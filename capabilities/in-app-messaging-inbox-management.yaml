naftiko: 1.0.0-alpha2
info:
  label: AT&T In-App Messaging API — Inbox Management
  description: 'AT&T In-App Messaging API — Inbox Management. 2 operations. Lead operation: AT&T Get Inbox Changes (Delta
    Sync). Self-contained Naftiko capability covering one At And T business surface.'
  tags:
  - At And T
  - Inbox Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AT_AND_T_API_KEY: AT_AND_T_API_KEY
capability:
  consumes:
  - type: http
    namespace: in-app-messaging-inbox-management
    baseUri: https://api.att.com
    description: AT&T In-App Messaging API — Inbox Management business capability. Self-contained, no shared references.
    resources:
    - name: myMessages-v2-delta
      path: /myMessages/v2/delta
      operations:
      - name: getinboxdelta
        method: GET
        description: AT&T Get Inbox Changes (Delta Sync)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: State token from the previous delta sync or index creation
          required: true
    - name: myMessages-v2-messages-index
      path: /myMessages/v2/messages/index
      operations:
      - name: createmessageindex
        method: POST
        description: AT&T Create Message Index Cache
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.AT_AND_T_API_KEY}}'
  exposes:
  - type: rest
    namespace: in-app-messaging-inbox-management-rest
    port: 8080
    description: REST adapter for AT&T In-App Messaging API — Inbox Management. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/mymessages/v2/delta
      name: mymessages-v2-delta
      description: REST surface for myMessages-v2-delta.
      operations:
      - method: GET
        name: getinboxdelta
        description: AT&T Get Inbox Changes (Delta Sync)
        call: in-app-messaging-inbox-management.getinboxdelta
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mymessages/v2/messages/index
      name: mymessages-v2-messages-index
      description: REST surface for myMessages-v2-messages-index.
      operations:
      - method: POST
        name: createmessageindex
        description: AT&T Create Message Index Cache
        call: in-app-messaging-inbox-management.createmessageindex
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: in-app-messaging-inbox-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for AT&T In-App Messaging API — Inbox Management. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: at-t-get-inbox-changes-delta
      description: AT&T Get Inbox Changes (Delta Sync)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: in-app-messaging-inbox-management.getinboxdelta
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: at-t-create-message-index-cache
      description: AT&T Create Message Index Cache
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: in-app-messaging-inbox-management.createmessageindex
      outputParameters:
      - type: object
        mapping: $.
