naftiko: 1.0.0-alpha2
info:
  label: AT&T MVNX API — Balance Management
  description: 'AT&T MVNX API — Balance Management. 1 operations. Lead operation: AT&T Create Balance Top-Up. Self-contained
    Naftiko capability covering one At And T business surface.'
  tags:
  - At And T
  - Balance Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AT_AND_T_API_KEY: AT_AND_T_API_KEY
capability:
  consumes:
  - type: http
    namespace: mvnx-balance-management
    baseUri: https://devex-web.att.com
    description: AT&T MVNX API — Balance Management business capability. Self-contained, no shared references.
    resources:
    - name: topupBalance
      path: /topupBalance
      operations:
      - name: topupbalance
        method: POST
        description: AT&T Create Balance Top-Up
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Client-Id
      value: '{{env.AT_AND_T_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mvnx-balance-management-rest
    port: 8080
    description: REST adapter for AT&T MVNX API — Balance Management. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/topupbalance
      name: topupbalance
      description: REST surface for topupBalance.
      operations:
      - method: POST
        name: topupbalance
        description: AT&T Create Balance Top-Up
        call: mvnx-balance-management.topupbalance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mvnx-balance-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for AT&T MVNX API — Balance Management. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: at-t-create-balance-top-up
      description: AT&T Create Balance Top-Up
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mvnx-balance-management.topupbalance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
