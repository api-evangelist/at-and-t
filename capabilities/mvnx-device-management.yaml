naftiko: 1.0.0-alpha2
info:
  label: AT&T MVNX API — Device Management
  description: 'AT&T MVNX API — Device Management. 3 operations. Lead operation: AT&T List Devices and SIMs. Self-contained
    Naftiko capability covering one At And T business surface.'
  tags:
  - At And T
  - Device Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AT_AND_T_API_KEY: AT_AND_T_API_KEY
capability:
  consumes:
  - type: http
    namespace: mvnx-device-management
    baseUri: https://devex-web.att.com
    description: AT&T MVNX API — Device Management business capability. Self-contained, no shared references.
    resources:
    - name: resource
      path: /resource
      operations:
      - name: listresources
        method: GET
        description: AT&T List Devices and SIMs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: relatedParty.id
          in: query
          type: string
          description: Filter resources by subscriber ID
    - name: resource-id
      path: /resource/{id}
      operations:
      - name: getresource
        method: GET
        description: AT&T Get Device or SIM Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Resource (device or SIM) ID
          required: true
      - name: updateresource
        method: PATCH
        description: AT&T Update Resource (Reset Voicemail Password)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Resource ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Client-Id
      value: '{{env.AT_AND_T_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mvnx-device-management-rest
    port: 8080
    description: REST adapter for AT&T MVNX API — Device Management. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/resource
      name: resource
      description: REST surface for resource.
      operations:
      - method: GET
        name: listresources
        description: AT&T List Devices and SIMs
        call: mvnx-device-management.listresources
        with:
          relatedParty.id: rest.relatedParty.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/resource/{id}
      name: resource-id
      description: REST surface for resource-id.
      operations:
      - method: GET
        name: getresource
        description: AT&T Get Device or SIM Status
        call: mvnx-device-management.getresource
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateresource
        description: AT&T Update Resource (Reset Voicemail Password)
        call: mvnx-device-management.updateresource
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mvnx-device-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for AT&T MVNX API — Device Management. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: at-t-list-devices-and-sims
      description: AT&T List Devices and SIMs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mvnx-device-management.listresources
      with:
        relatedParty.id: tools.relatedParty.id
      outputParameters:
      - type: object
        mapping: $.
    - name: at-t-get-device-sim-status
      description: AT&T Get Device or SIM Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mvnx-device-management.getresource
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: at-t-update-resource-reset-voicemail
      description: AT&T Update Resource (Reset Voicemail Password)
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mvnx-device-management.updateresource
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
