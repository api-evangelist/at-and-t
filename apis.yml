aid: at-and-t
name: AT&T
description: AT&T is a multinational telecommunications holding company providing wireless and wireline
  telecommunications services, broadband, and digital entertainment to consumers and businesses worldwide.
  AT&T offers a suite of developer APIs spanning messaging, speech, mobile virtual network operations,
  business voice, wholesale service qualification, enterprise wireline ordering, and mobility management,
  enabling developers and enterprise partners to integrate AT&T network capabilities into applications
  and systems.
type: Index
