  - type: Features
    data:
      - 'AT&T: API access via partner / B2B contracts only'
      - No public API pricing published — contact enterprise sales
      - AT&T Business APIs (Network APIs, IoT Connectivity, etc.) are sold via partner program with custom
        contracts.
    sources:
      - https://developer.att.com/
      - https://www.att.com/business/
    updated: '2026-05-04'
  - type: UseCases
    data:
      - name: SMS Alerts and Notifications
        description: Send security verification codes, appointment reminders, promotional offers, and
          customer feedback requests via SMS short code.
      - name: In-App Messaging Integration
        description: Embed MMS and SMS messaging directly into mobile applications with full inbox management
          capabilities.
      - name: Mobile Virtual Network Operations
        description: Launch and operate MVNO services using AT&T's network with automated subscriber onboarding,
          porting, and lifecycle management.
      - name: Enterprise Wireline Ordering
        description: Automate service qualification, quoting, and order submission for enterprise connectivity
          services.
  - type: Integrations
    data:
      - name: IBM Worklight
        description: AT&T API Platform Adapters for IBM Worklight mobile development platform.
      - name: Salesforce Platform
        description: AT&T Toolkit for Salesforce enabling speech and messaging API integration in Salesforce
          apps.
      - name: TM Forum APIs
        description: MVNX APIs align with TM Forum Open API standards including TMF 622, 637, 639, 640,
          654, 674, 689, 702, 716, and 761.
