apis:
  - aid: at-and-t:att-sms-api
    name: AT&T SMS API
    description: A RESTful API enabling established businesses to broadcast SMS short code messages to
      AT&T subscribers in the United States. Supports sending to up to 50 recipients per call and up to
      1 million messaging API calls monthly. Includes delivery status callbacks and GSMA OneAPI-compatible
      endpoints.
    humanURL: https://developer.att.com/sms
    baseURL: https://api.att.com
    tags:
      - SMS
      - Messaging
      - Short Code
      - Notifications
    properties:
      - type: Documentation
        url: https://developer.att.com/sms/docs
      - type: APIReference
        url: https://developer.att.com/sms/docs/v2
      - type: Authentication
        url: https://developer.att.com/oauth-2/docs
      - type: GettingStarted
        url: https://developer.att.com/sms
      - type: OpenAPI
        url: openapi/at-and-t-sms-api.yaml
  - aid: at-and-t:att-in-app-messaging-api
    name: AT&T In-App Messaging API
    description: A messaging API enabling applications to send, receive, update, and delete MMS and SMS
      messages on behalf of users with explicit consent. Supports messages to phone numbers, short codes,
      and email addresses across AT&T and other carriers, with inbox management and delta synchronization.
    humanURL: https://developer.att.com/in-app-messaging
    baseURL: https://api.att.com
    tags:
      - MMS
      - SMS
      - Messaging
      - In-App
      - Inbox
    properties:
      - type: Documentation
        url: https://developer.att.com/in-app-messaging/docs
      - type: Authentication
        url: https://developer.att.com/oauth-2/docs
      - type: OpenAPI
        url: openapi/at-and-t-in-app-messaging-api.yaml
  - aid: at-and-t:att-oauth-api
    name: AT&T OAuth 2.0 API
    description: AT&T OAuth 2.0 authentication API providing access tokens for all AT&T REST APIs. Supports
      Authorization Code, Client Credentials, and Refresh Token grant types. Scopes include ADS, MMS,
      SMS, SPEECH, STTC, and TTS.
    humanURL: https://developer.att.com/oauth-2
    baseURL: https://api.att.com
    tags:
      - OAuth
      - Authentication
      - Authorization
      - Security
    properties:
      - type: Documentation
        url: https://developer.att.com/oauth-2/docs
      - type: Authentication
        url: https://developer.att.com/oauth-2/docs
  - aid: at-and-t:att-mvnx-api
    name: AT&T MVNX API
    description: TM Forum-aligned API suite for mobile virtual network operators (MVNOs) enabling subscriber
      activation, number management, porting operations, device and SIM management, subscriber profile
      management, service management, and policy and balance management. Follows TMF standards (622, 637,
      639, 640, 654, 674, 689, 702, 716, 761).
    humanURL: https://devex-web.att.com/mvnx
    baseURL: https://devex-web.att.com
    tags:
      - MVNO
      - Mobile
      - Subscriber
      - TM Forum
      - Porting
      - SIM
    properties:
      - type: Documentation
        url: https://devex-web.att.com/mvnx/docs/mvnx-quickstart
      - type: GettingStarted
        url: https://devex-web.att.com/mvnx/docs/mvnx-quickstart
      - type: OpenAPI
        url: openapi/at-and-t-mvnx-api.yaml
  - aid: at-and-t:att-alliance-wireline-apis
    name: AT&T Alliance Wireline APIs
    description: Wireline business APIs enabling partners to expedite quoting, service qualification,
      and ordering of AT&T wireline products. Includes Quick Quote, Product Catalog, Service Qualification,
      Price Offer, Wireline Ordering, Order Status, AIAB (AT&T Internet Air for Business) Ordering, and
      Address Search APIs.
    humanURL: https://devex-web.att.com/alliance
    baseURL: https://devex-web.att.com
    tags:
      - Wireline
